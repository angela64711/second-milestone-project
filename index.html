<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU Geography Quiz</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Google Fonts-->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atma:wght@300;400;500;600;700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
    </style>
    <!--Stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    
    <main class="home-panel">
        <div id="intro" class="container">
            <div class="row">
                <div class="col-12">
                    <h1 class="text-center mb-3 mb-md-4">EU Geography Quiz</h1>
                </div>
            </div>
                <div class="row mb-3">
                    <div id="tagline-col" class="col-12">
                        <p id="welcome-tagline" class="mb-4 mb-md-5">How well<br>
                            do you know<br>
                            Europe?</p>
                    </div>
                </div>

                <!-- Start game button that launches the modal -->
                <div class="row justify-content-center mt-3">
                    <div class="col-10 col-sm-8 col-md-6 col-lg-4 text-center">
                        <button id="start-btn" class="btn btn-primary w-100" type="button" data-bs-toggle="modal"
                            data-bs-target="#startModal">
                            Start Game
                        </button>
                    </div>
                </div>
            
        </div>
    </main>

    <!--Dialog Modal to set game mode and number of questions-->

    <div class="modal fade" id="startModal" tabindex="-1" aria-labelledby="startModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h2 class="modal-title fs-5" id="startModalLabel">Choose Your Game</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="game-options-form">
                        <fieldset class="mb-3">
                            <legend class="fs-6">Game Mode</legend>

                            <div class="form-check">
                                <input id="capital-mode" class="form-check-input" type="radio" name="game-mode"
                                    value="capital" checked>
                                <label class="form-check-label" for="capital-mode">
                                    Guess the Capital
                                </label>
                            </div>

                            <div class="form-check">
                                <input id="flag-mode" class="form-check-input" type="radio" name="game-mode"
                                    value="flag">
                                <label class="form-check-label" for="flag-mode">
                                    Guess the Country from the Flag
                                </label>
                            </div>
                        </fieldset>

                        <div class="mb-3">
                            <label for="question-count" class="form-label">Number of Questions</label>
                            <select id="question-count" class="form-select">
                                <option value="5">5</option>
                                <option value="10" selected>10</option>
                                <option value="20">20</option>
                            </select>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="begin-game-btn" class="btn btn-primary">Start Quiz</button>
                </div>

            </div>
        </div>
    </div>

    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!--JS Script-->
    <script src="assets/js/country-data.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
