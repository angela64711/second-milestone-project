<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU Geography Quiz</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Google Fonts-->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atma:wght@300;400;500;600;700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
    </style>
    <!--Stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <div class="container text-center py-4">
            <h1>EU Geography Quiz</h1>
        </div>
    </header>
    <main>
        <div class="container">
            <section id="results">

                <div class="row justify-content-center text-center mb-4">
                    <div class="col-12 col-md-8 col-lg-6">
                        <h2>Your Results</h2>
                        <p id="score">You scored 7 out of 10!</p>
                    </div>
                </div>

                <div class="row justify-content-center text-center">
                    <div class="col-10 col-sm-8 col-md-6 col-lg-4">
                        <button id="replay-btn" class="btn btn-primary w-100">Play Again!</button>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!--JS Script-->
    <script src="assets/js/country-data.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
