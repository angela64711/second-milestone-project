<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU Geography Quiz</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Favicon-->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    <!--Google Fonts-->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atma:wght@300;400;500;600;700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
    </style>
    <!--Stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <main class="home-panel">

        <div id="game-container" class="container">
            <div class="row justify-content-center text-center mt-2">
                <div class="col-12">
                    <h1 id="game-mode">Guess the Capital</h1>
                </div>
            </div>
            <div id="question-area" class="row justify-content-center text-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <p id="question-counter">Question 1 of 10</p>
                    <p id="question">What is the capital of Italy?</p>
                    <img id="flag-img" class="img-fluid mt-1" src="" alt="">
                </div>
            </div>

            <div id="answers-area">
                <div class="row justify-content-center g-1">
                    <div class="col-10 col-sm-8 col-md-6">
                        <button class="answer-btn  w-75">Paris</button>
                    </div>
                    <div class="col-10 col-sm-8 col-md-6">
                        <button class="answer-btn w-75">Rome</button>
                    </div>
                </div>
                <div class="row justify-content-center g-1 mt-md-2">
                    <div class="col-10 col-sm-8 col-md-6">
                        <button class="answer-btn w-75">Berlin</button>
                    </div>
                    <div class="col-10 col-sm-8 col-md-6">
                        <button class="answer-btn w-75">Madrid</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!--JS Script-->
    <script src="assets/js/country-data.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
