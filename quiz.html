<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU Geography Quiz</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Google Fonts-->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atma:wght@300;400;500;600;700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
    </style>
    <!--Stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <div class="container text-center py-4">
            <h1>EU Geography Quiz</h1>
        </div>
    </header>

    <main>

        <section id="game-container">

            <div class="container">
                <div class="row justify-content-center text-center mb-4">
                    <div class="col-12">
                        <h2 id="game-mode">Guess the Capital</h2>
                    </div>
                </div>
                <div id="question-area" class="row justify-content-center text-center mb-4">
                    <div class="col-12 col-md-8 col-lg-6">
                        <p id="question-counter">Question 1 of 10</p>
                        <p id="question">What is the capital of Italy?</p>
                        <img id="flag-image" class="img-fluid mt-3" src="" alt="">
                    </div>
                </div>

                <div id="answers-area">
                    <div class="row justify-content-center mb-3">
                        <div class="col-10 col-md-5 col-lg-4">
                            <button class="answer-btn btn btn-outline-primary w-100">Paris</button>
                        </div>
                        <div class="col-10 col-md-5 col-lg-4">
                            <button class="answer-btn btn btn-outline-primary w-100">Rome</button>
                        </div>
                    </div>
                    <div class="row justify-content-center mb-3">
                        <div class="col-10 col-md-5 col-lg-4">
                            <button class="answer-btn btn btn-outline-primary w-100">Berlin</button>
                        </div>
                        <div class="col-10 col-md-5 col-lg-4">
                            <button class="answer-btn btn btn-outline-primary w-100">Madrid</button>
                        </div>
                    </div>
                </div>
            </div>

        </section>

    </main>
    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!--JS Script-->
    <script src="assets/js/country-data.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
